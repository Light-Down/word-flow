<svg viewBox="0 0 1024 1024" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D1E20" />
      <stop offset="100%" stop-color="#111112" />
    </linearGradient>
    
    <!-- White Pill Gradient (3D effect) -->
    <linearGradient id="whitePill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F2F2F2" />
    </linearGradient>
    
    <filter id="innerShadow">
      <feOffset dx="0" dy="-4"/>
      <feGaussianBlur stdDeviation="6" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.12" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
    
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    
    <!-- Orange Pill Gradient -->
    <linearGradient id="orangeGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F19548" />
      <stop offset="100%" stop-color="#CA6B2B" />
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="230" fill="url(#bgGlow)" />
  <rect x="12" y="12" width="1000" height="1000" rx="218" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="12" />

  <!-- Shapes -->
  <!-- We apply the drop shadow to the container -->
  <g filter="url(#dropShadow)">
    
    <!-- White Bar 1 -->
    <rect x="0" y="0" width="190" height="560" rx="60" fill="url(#whitePill)" filter="url(#innerShadow)" transform="translate(140, 250) rotate(-24)" />
    
    <!-- White Bar 2 -->
    <rect x="0" y="0" width="190" height="560" rx="60" fill="url(#whitePill)" filter="url(#innerShadow)" transform="translate(420, 250) rotate(-24)" />

    <!-- Orange Bar 3 -->
    <rect x="0" y="0" width="190" height="280" rx="60" fill="url(#orangeGlow)" filter="url(#innerShadow)" transform="translate(700, 250) rotate(-24)" />

  </g>
</svg>